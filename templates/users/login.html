{% extends 'auth_base.html' %}
{% load custom_filters %}

{% block title %}Kirish - i-Mobile{% endblock %}

{% block content %}

<div class="card shadow-lg border-0 p-4"
     style="width:100%; max-width:420px; border-radius:20px;">

    <div class="text-center mb-4">
        <i class="bi bi-phone" style="font-size:3rem; color:#667eea;"></i>
        <h2 class="mt-3 fw-bold">i-Mobile</h2>
        <p class="text-muted small">Telefon sotuvchi kompaniyasi uchun Axborot tizimi</p>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control form-control-lg">
        </div>

        <div class="mb-3">
            <label class="form-label">Parol</label>
            <input type="password" name="password" class="form-control form-control-lg">
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg">
            Kirish
        </button>
    </form>

</div>

{% endblock %}
